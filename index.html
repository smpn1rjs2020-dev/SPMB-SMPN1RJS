<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--gold:#d4af37;
--green:#0f766e;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
}

/* BACKGROUND */

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;

    background:url("background.jpg") center/cover no-repeat;
    background-attachment: scroll;
}

@media (min-width: 1024px){
    body{
        background-attachment: fixed;
    }
}

.overlay{
position:fixed;
inset:0;
background:
linear-gradient(
180deg,
rgba(0,0,0,.55),
rgba(0,0,0,.70)
);
backdrop-filter:blur(2px);
z-index:-2;
}

/* MAIN */

.container{
min-height:calc(100vh - 70px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:8px;
text-align:center;
}

.logo{
width:130px;
margin-bottom:10px;
filter:drop-shadow(0 8px 15px rgba(0,0,0,.4));
}

h1{
color:white;
font-size:clamp(42px,8vw,80px);
font-weight:700;
margin: 0;
line-height:.9;
}

h3{
color:var(--gold);
font-size:clamp(27px,3vw,32px);
margin-top:0;
margin-bottom:20px;
}

.subtitle{
color:white;
font-size:clamp(20px,2vw,25px);
font-weight:500;
margin-top:0;
opacity:.9;
margin-bottom:5px;
}

/* MENU */

.cards{
    width:100%;
    max-width:1000px;

    display:flex;
    flex-wrap:wrap;

    justify-content:center;

    gap:20px;
}

.card{
    width:220px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:24px;

    padding:15px 10px;

    cursor:pointer;

    transition:.35s;
}

.card:hover{

transform:
translateY(-8px)
scale(1.03);

background:
rgba(212,175,55,.20);

}

.icon{
font-size:42px;
margin-bottom:10px;
}

.card-title{
color:white;
font-size:20px;
font-weight:600;
}

/* MODAL */

.modal{
display:none;

position:fixed;
inset:0;

background:
rgba(0,0,0,.75);

justify-content:center;
align-items:center;

padding:20px;

z-index:999;
}

.modal-box{

width:100%;
max-width:650px;

background:white;

border-radius:25px;

padding:30px;

position:relative;

animation:show .25s ease;
}

@keyframes show{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

.close{

position:absolute;

right:20px;
top:15px;

font-size:30px;
cursor:pointer;
}

.modal h3{
color:var(--green);
margin-bottom:20px;
font-size:28px;
}

.modal ul{
padding-left:20px;
}

.modal li{
margin-bottom:10px;
}

.download-btn{

display:inline-block;

margin-top:20px;

padding:12px 20px;

background:var(--gold);

color:black;

text-decoration:none;

border-radius:12px;

font-weight:600;
}

/* WA */

.wa{
    position:fixed;
    right:20px;
    bottom:20px;

    background:#25D366;
    color:white;

    padding:10px 14px;
    border-radius:50px;

    display:flex;
    align-items:center;
    gap:8px;

    text-decoration:none;
    font-weight:600;

    font-size:14px;

    max-width:90vw;
}
@media (max-width: 600px){
    .wa{
        right:14px;
        bottom:14px;

        padding:12px 14px;
        font-size:14px;

        border-radius:50px;
    }

    .wa i{
        font-size:25px;
    }

    .wa span{
        display:none; /* tetap tampil di HP */
    }
}
/* FOOTER */

.footer{

    width:100%;

    margin-top:15px;

    padding:10px 5px;

    text-align:center;

    color:white;

    background:rgba(255,255,255,.22);

    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border-top:1px solid rgba(255,255,255,.35);

    box-shadow:
    0 -5px 20px rgba(0,0,0,.08);

}
</style>
</head>
